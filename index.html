<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBKU Login & Signup</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>SBKU</h1>

    <!-- Signup -->
    <div id="signupSection">

        <h2>Create Account</h2>

        <input type="text" id="sName" placeholder="Full Name">

        <input type="email" id="sEmail" placeholder="Email">

        <input type="password" id="sPassword" placeholder="Password">

        <button onclick="signup()">Sign Up</button>

        <p>
            Already have an account?
            <a href="#" onclick="showLogin()">Login</a>
        </p>

    </div>

    <!-- Login -->
    <div id="loginSection" class="hidden">

        <h2>Login</h2>

        <input type="email" id="lEmail" placeholder="Email">

        <input type="password" id="lPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p>
            Don't have an account?
            <a href="#" onclick="showSignup()">Sign Up</a>
        </p>

    </div>

    <div id="message"></div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
